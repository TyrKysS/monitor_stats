name: "Entity Logger"
description: "Loguje stav vybraných entit do CSV souboru a umožňuje jejich stažení jedním kliknutím"
version: "1.0.2"
slug: "monitor_stats"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
homeassistant_api: true
options:
  entities:
    - entity_id: "sensor.illuminance"
      name: "Osvětlení"
      type: "sensor"
    - entity_id: "input_number.my_helper"
      name: "Pomocník"
      type: "input_number"
    - entity_id: "light.hue_bulb"
      name: "Žárovka Hue"
      type: "light"
schema:
  entities:
    - entity_id: str
      name: str?
      type: str
ingress: true
ingress_port: 8099
panel_icon: mdi:chart-line
panel_title: "Entity Logger"
